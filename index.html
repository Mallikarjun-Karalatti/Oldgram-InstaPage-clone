        <title>Oldgram</title>

    <body>
        <div class="container">
        <header class="flex padding-lr">
            <img id="oldgram-logo" src="/images/logo.png" alt="Oldgram page logo"/>
            <img class="img-circular" src="/images/user-avatar.png" alt="User Per Borgan Avatar"/>
        </header>
        <main>
           <section>
                <div class="post-info flex padding-lr">
                    <img class="post-user-avt img-circular" src="/images/avatar-vangogh.jpg" alt="User vincey1853 Avatar"/>

                        <p class="post-user-loc">Zundert, Netherlands</p>
                    </div>
                </div>

                    <img class="post" src="/images/post-vangogh.jpg" alt="User vincey1853 Post"/>
                </div>

                    <div class="cta-icon flex">
                        <button class="like-btn" aria-label="Like">
                            <img class="img-cta-icon" src="/images/icon-heart.png" alt="A heart shaped black icon"/>
                        </button>
                        <button aria-label="comment">
                            <img class="img-cta-icon" src="/images/icon-comment.png" alt="A black comment icon"/>
                        </button>
                        <button aria-label="share">
                            <img class="img-cta-icon" src="/images/icon-dm.png" alt="A black plane icon"/>
